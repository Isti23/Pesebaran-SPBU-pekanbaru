      // ==========================================
      // SCRIPT JEMBATAN FILTER SPBU (BARU)
      // ==========================================

      // 1. Simpan semua titik SPBU asli ke dalam wadah (layer_SPBU_PKU_3 adalah nama layer SPBU-mu)
      var semuaSPBU = [];
      layer_SPBU_PKU_3.eachLayer(function (layer) {
        semuaSPBU.push(layer);
      });

      // 2. Dengarkan pesan dari dashboard.html
      window.addEventListener("message", function (event) {
        var data = event.data;
        if (!data || (!data.kecamatan && data.kecamatan !== "")) return;

        var targetKecamatan = (data.kecamatan || "Semua").toLowerCase();
        var targetSearch = (data.searchQuery || "").toLowerCase();
        var batasKoordinat = [];

        // 3. Filter titik satu per satu
        semuaSPBU.forEach(function (layer) {
          var props = layer.feature.properties;
          var kecPeta = (props["Kecamatan"] || "").toLowerCase();
          var namaPeta = (props["Nama SPBU"] || "").toLowerCase();
          var alamatPeta = (props["Alamat"] || "").toLowerCase();

          // Cek apakah cocok dengan tombol kecamatan dan kolom pencarian
          var cocokKecamatan =
            targetKecamatan === "semua" || kecPeta === targetKecamatan;
          var cocokSearch =
            targetSearch === "" ||
            namaPeta.includes(targetSearch) ||
            alamatPeta.includes(targetSearch);

          if (cocokKecamatan && cocokSearch) {
            // Jika cocok, tampilkan titiknya
            if (!map.hasLayer(layer)) {
              map.addLayer(layer);
            }
            batasKoordinat.push(layer.getLatLng()); // Kumpulkan koordinat untuk auto-zoom
          } else {
            // Jika tidak cocok, cabut titiknya dari peta
            if (map.hasLayer(layer)) {
              map.removeLayer(layer);
            }
          }
        });

        // 4. Auto-Zoom ke titik yang tersisa (Maksimal zoom 15 agar tidak terlalu dekat)
        if (batasKoordinat.length > 0) {
          map.fitBounds(L.latLngBounds(batasKoordinat), {
            padding: [50, 50],
            maxZoom: 15,
          });
        }
      });
    </script>
